<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
        padding: 0;
        font: inherit;
      }

      html {
        color-scheme: dark light;
      }

      body {
        min-height: 200vh; /* Make sure there's enough space for scrolling */
        background-color: black;
      }

      img,
      picture,
      svg,
      video {
        display: block;
        max-width: 100%;
      }

      /* Twinkling Stars and Spotlight */
      @keyframes twinkleStar {
        from,
        to {
          scale: 0.75;
        }
        50% {
          scale: 1.25;
        }
      }

      span {
        animation: twinkleStar 1s infinite;
        animation-delay: calc(2s * var(--random));
      }

      #section1 {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      #background {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: absolute;
        top: 0;
        left: 0;
        z-index: -1;
      }

      #spotlight {
        background: radial-gradient(
          circle,
          rgba(14, 75, 198, 0.25),
          rgba(0, 2, 94, 0.25),
          transparent
        );
        height: 400px;
        width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 100%;
        position: absolute;
      }

      #content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: absolute;
        z-index: 1;
      }

      h1,
      h2 {
        color: whitesmoke;
        font-family: Roboto;
      }

      h1 {
        font-size: 3rem;
        padding: 20px;
      }

      h2 {
        font-size: 2rem;
      }

      #button {
        padding: 8px 32px;
        border: 2px solid rgb(67, 127, 255);
        border-radius: 2px;
        margin: 32px;
        color: rgb(67, 127, 255);
        font-family: Roboto;
        font-size: 1.5rem;
        background-color: black;
      }

      /* Rocket Launch */
      #section2 {
        width: 100%;
        height: 120vh;
        overflow: hidden;
      }

      #background1 {
        width: 100%;
        height: 100vh;
        background: linear-gradient(
          to bottom,
          rgb(0, 0, 0),
          rgb(13, 111, 163),
          rgb(114, 202, 249),
          rgb(140, 215, 255)
        );
      }

      #background2 {
        width: 100%;
        height: 20vh;
        background: rgb(140, 215, 255);
      }

      #rocketContainer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 150vh;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
      }

      #rocket {
        position: absolute;
        height: 900px;
        fill: white;
        left: 50%;
        bottom: -115%;
      }
    </style>
  </head>
  <body>
    <!-- Twinkling Stars & Spotlight Section -->
    <div id="section1">
      <div id="background"></div>
      <div id="spotlight"></div>
      <div id="content">
        <h1>
          My name is <span style="color: rgb(67, 127, 255)">Timothy.</span>
        </h1>
        <h2>
          And I like to
          <span style="color: rgb(67, 127, 255)">build</span> things.
        </h2>
        <div id="button">See My Work</div>
      </div>
    </div>

    <!-- Rocket Launch Section -->
    <div id="section2">
      <div id="background1"></div>
      <div id="background2"></div>
      <div id="rocketContainer">
        <img id="rocket" src="./Saturn_V.svg" alt="Rocket Image" />
      </div>
    </div>

    <script>
      // Spotlight Effect
      let x = 0;
      let y = 0;
      let radius = 200;
      let spotlight = document.getElementById("spotlight");
      let body = document.querySelector("body");
      let stars = [];

      body.addEventListener("mousemove", (e) => {
        x = e.clientX - radius;
        y = e.clientY - radius;
        spotlight.style.left = x + "px";
        spotlight.style.top = y + "px";

        updateTwinklingStars();
      });

      spotlight.style.left = x + "px";
      spotlight.style.top = y + "px";

      const background = document.getElementById("background");

      for (let i = 0; i < 1000; i++) {
        let span = document.createElement("span");
        let starSize = Math.random() > 0.5 ? "3px" : "2px";

        span.style.setProperty("--random", Math.random());
        span.style.width = "2px";
        span.style.height = starSize;
        span.style.position = "absolute";
        span.style.backgroundColor = "white";
        span.style.opacity = Math.min(Math.random() + 0.25, 1);
        span.style.left = Math.random() * window.innerWidth + "px";
        span.style.top = Math.random() * window.innerHeight + "px";
        span.style.transform = "rotate(" + Math.random() * 360 + "deg)";

        background.appendChild(span);
        stars.push(span);
      }

      function updateTwinklingStars() {
        const spotlightBounds = spotlight.getBoundingClientRect();

        stars.forEach((star) => {
          const starBounds = star.getBoundingClientRect();

          if (
            starBounds.left >= spotlightBounds.left &&
            starBounds.right <= spotlightBounds.right &&
            starBounds.top >= spotlightBounds.top &&
            starBounds.bottom <= spotlightBounds.bottom
          ) {
            star.style.animation = "twinkleStar 1s infinite";
          } else {
            star.style.animation = "none";
          }
        });
      }

      // Rocket Launch Effect
      const rocket = document.getElementById("rocket");

      function updateRocketPosition() {
        const scrollY = window.scrollY;
        const maxScroll = (window.innerHeight / 4) * 3;

        const speed = 2.5;
        const moveUp = Math.min(scrollY * 1.2 * speed, window.innerHeight * 2);
        const moveRight = Math.min(scrollY * 0.25 * speed, window.innerWidth);
        const rotateAngle = Math.max((1 - scrollY / maxScroll) * 20, 0);
        const opacity = scrollY > window.innerHeight * 1.5 ? 0 : 1;

        rocket.style.transform = `translate(${moveRight}px, -${moveUp}px) rotate(${rotateAngle}deg)`;
        rocket.style.opacity = opacity;
      }

      window.addEventListener("scroll", updateRocketPosition);
    </script>
  </body>
</html>
