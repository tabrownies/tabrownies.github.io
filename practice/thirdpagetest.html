<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
        padding: 0;
        font: inherit;
      }

      html {
        color-scheme: dark light;
      }

      body {
        min-height: 100vh;
      }

      img,
      picture,
      svg,
      video {
        display: block;
        max-width: 100%;
      }

      body {
        background-color: black;
        color: #fafafa;
      }

      .technology-bubble {
        height: 48px;
        padding: 8px 12px;
        border-radius: 16px;
        background-color: rgb(32, 32, 32);
        display: flex;
        align-items: center;
        width: fit-content;
        font-size: 24px;
        font-family: "Roboto", sans-serif;
      }
      .technology-bubble img {
        height: 100%;
        object-fit: contain;
        padding-right: 8px;
      }
    </style>
  </head>
  <body>
    <div style="display: flex; justify-content: center">
      <div class="toolbox-container">
        <h2>My Toolbox</h2>
        <ul>
          <li>⚡ Rapid Prototyping</li>
          <li>🛠️ Technical Product Management</li>
          <li>🤖 Machine Learning</li>
          <li>🌐 Full Stack Web Development</li>
          <li>🔩 Backend Development</li>
          <li>📊 Data Science</li>
        </ul>
      </div>
      <div class="technology-container">
        <h3>Technologies</h3>
        <ul>
          <li class="technology-bubble">
            <img src="technologyLogos/python.svg" /> Python
          </li>
        </ul>
      </div>
    </div>
  </body>
</html>
