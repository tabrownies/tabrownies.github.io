<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
        padding: 0;
        font: inherit;
      }

      html {
        color-scheme: dark light;
      }

      body {
        min-height: 100vh;
      }

      img,
      picture,
      SVG,
      video {
        display: block;
        max-width: 100%;
      }

      /* custom styles */
      #background1 {
        width: 100%;
        height: 100vh;
        /* make it a gradient vertically */
        background: linear-gradient(
          to bottom,
          rgb(0, 0, 0),
          rgb(13, 111, 163),
          rgb(114, 202, 249),
          rgb(140, 215, 255)
        );
      }
      #background2 {
        width: 100%;
        height: 20vh;
        background: rgb(140, 215, 255);
      }
      #background3 {
        width: 100%;
        height: 100vh;
        /* make it a gradient vertically */
        background-color: rgb(140, 215, 255);
      }

      #rocketContainer {
        position: fixed; /* Keep it relative to the viewport */
        bottom: 0;
        left: 0;
        width: 100%;
        height: 150vh; /* Extra height so the rocket moves freely */
        overflow: hidden; /* Ensures top clipping */
        display: flex;
        align-items: flex-end; /* Keeps rocket at the bottom initially */
      }

      #rocket {
        position: absolute; /* Keeps it positioned relative to #rocketContainer */
        height: 900px;
        fill: white;
        left: 50%; /* Start slightly off-screen on the right */
        bottom: -15%; /* Partially below the screen */
      }
    </style>
  </head>
  <body>
    <div id="background1"></div>
    <div id="background2"></div>
    <div id="background3"></div>
    <div id="rocketContainer">
      <img id="rocket" src="./Saturn_V.svg" alt="Rocket Image" />
    </div>
  </body>
  <script>
    const rocket = document.getElementById("rocket");

    function updateRocketPosition() {
      const scrollY = window.scrollY;
      const maxScroll = (window.innerHeight / 4) * 3;

      const speed = 1.5;

      // Move the rocket up and to the right
      const moveUp = Math.min(scrollY * 1.2 * speed, window.innerHeight * 2); // Moves beyond screen
      const moveRight = Math.min(scrollY * 0.25 * speed, window.innerWidth); // Gradually right
      const rotateAngle = Math.max((1 - scrollY / maxScroll) * 20, 0); // Rotates from 0° to 20°

      // Fade out when it exits the screen
      const opacity = scrollY > window.innerHeight * 1.5 ? 0 : 1;

      rocket.style.transform = `translate(${moveRight}px, -${moveUp}px) rotate(${rotateAngle}deg)`;
      rocket.style.opacity = opacity;
    }

    // Initial positioning
    updateRocketPosition();

    // Listen for scroll events
    window.addEventListener("scroll", updateRocketPosition);
  </script>
</html>
